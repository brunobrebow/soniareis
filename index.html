<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sonia Reis CRM" />
  <meta name="theme-color" content="#D4537E" />
  <title>Sonia Reis CRM</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen"></div>

  <!-- App (hidden until logged in) -->
  <div id="app" style="display:none">
    <div class="screen" id="screen"></div>
    <nav class="bottomnav" id="bottomnav"></nav>
    <div id="toast" class="toast"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          reg.update();
        });
      });
    }
    window.addEventListener('load', () => {
      if (AUTH.isLoggedIn()) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        init();
      } else {
        document.getElementById('login-screen').innerHTML = `
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;padding:20px">
            <div style="width:100%;max-width:340px;text-align:center">
              <div style="width:72px;height:72px;border-radius:50%;background:#FBEAF0;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px">💎</div>
              <h2 style="font-size:22px;color:#1a1a1a;margin-bottom:4px">Sonia Reis CRM</h2>
              <p style="font-size:14px;color:#aaa;margin-bottom:24px">Faça login para continuar</p>
              <div style="margin-bottom:12px;text-align:left">
                <label style="font-size:13px;color:#888;display:block;margin-bottom:4px">Login</label>
                <input id="l-user" class="form-input" placeholder="Usuário" autocomplete="username" style="width:100%;box-sizing:border-box" />
              </div>
              <div style="margin-bottom:16px;text-align:left">
                <label style="font-size:13px;color:#888;display:block;margin-bottom:4px">Senha</label>
                <input id="l-pass" class="form-input" type="password" placeholder="Senha" autocomplete="current-password" style="width:100%;box-sizing:border-box" onkeydown="if(event.key==='Enter')doLogin()" />
              </div>
              <div id="l-error" style="color:#A32D2D;font-size:13px;margin-bottom:12px"></div>
              <button onclick="doLogin()" style="width:100%;padding:14px;background:#D4537E;border:none;border-radius:12px;color:white;font-size:16px;font-weight:600;cursor:pointer">Entrar</button>
            </div>
          </div>`;
        document.getElementById('login-screen').style.display = 'block';
      }
    });
  </script>

</body>
</html>
